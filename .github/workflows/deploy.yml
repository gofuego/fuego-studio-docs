name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # main → gh-pages: the public, read-only GitHub Pages site.
    # The editable fuego-studio preview is built from develop in preview.yml.
    permissions:
      contents: write
    uses: gofuego/.github/.github/workflows/fuego-deploy.yml@main
    with:
      pages_base: /fuego-studio-docs
      check_links: true
